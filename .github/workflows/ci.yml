# CI — the book's Chapter 9 (DDD Patterns for Continuous Integration)
# applied end to end. The pipeline is the same gate developers run locally
# (task lint / test:race / cover), extended with static analysis,
# vulnerability scanning (govulncheck + Trivy, scan-only — no image is
# published from CI), migration verification against a real Postgres, and
# a full compose smoke test that also builds and boots the production
# image (postgres + rabbitmq + api + seed).
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint:
    name: Lint & static analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Task
        uses: arduino/setup-task@v3
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Dependencies are tidy
        run: go mod tidy && git diff --exit-code go.mod go.sum

      - name: gofmt + go vet
        run: task lint

      - name: staticcheck
        run: go run honnef.co/go/tools/cmd/staticcheck@latest ./...

  architecture:
    name: Architecture fitness functions
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Task
        uses: arduino/setup-task@v3
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # The NetArchTest equivalent (book Ch. 6): module isolation
      # (Sales ⊥ Warehouses), REST-through-facades-only, muflone stays
      # generic, and the per-module SharedKernel/Domain/ReadModel layering.
      - name: Verify module boundaries and layering
        run: task check:architecture

  test:
    name: Tests (race) + 100% coverage gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Task
        uses: arduino/setup-task@v3
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # Specification tests (Given/When/Expect), e2e tests, and the
      # architecture fitness functions all run here.
      - name: Tests under the race detector
        run: task test:race

      - name: Coverage gate — 100% unit coverage (internal/app exempt)
        run: task cover

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out

  security:
    name: Vulnerability scan (scan-only, no image publish)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: govulncheck — vulnerabilities reachable from our code
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      # Trivy scans the repo (lockfile CVEs + leaked secrets) directly —
      # no docker build, no registry, no publish.
      - name: Trivy — dependency CVEs and secrets
        run: |
          docker run --rm -v "$PWD:/repo" aquasec/trivy fs \
            --scanners vuln,secret \
            --severity HIGH,CRITICAL --ignore-unfixed \
            --exit-code 1 /repo

  migrations:
    name: Migrations (Atlas) against Postgres
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: beer
          POSTGRES_PASSWORD: beerpassword
          POSTGRES_DB: beer
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U beer -d beer"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 15
    steps:
      - uses: actions/checkout@v7

      - name: Verify atlas.sum integrity
        run: |
          docker run --rm -v "$PWD/migrations/versions:/versions" \
            arigaio/atlas migrate hash --dir file:///versions
          git diff --exit-code migrations/versions/atlas.sum

      - name: Apply migrations to a fresh database
        run: |
          docker run --rm --network host -v "$PWD/migrations:/migrations" \
            arigaio/atlas migrate apply --dir file:///migrations/versions \
            --url "postgres://beer:beerpassword@localhost:5432/beer?sslmode=disable"

      - name: Migration status is clean
        run: |
          docker run --rm --network host -v "$PWD/migrations:/migrations" \
            arigaio/atlas migrate status --dir file:///migrations/versions \
            --url "postgres://beer:beerpassword@localhost:5432/beer?sslmode=disable"

  e2e-smoke:
    name: Compose smoke test (full event flow)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Bring up the stack (postgres → migrate → api → seed)
        run: docker compose up --build -d

      - name: Wait for the API
        run: |
          for _ in $(seq 1 60); do
            curl -sf localhost:8080/healthz && exit 0
            sleep 2
          done
          echo "API never became healthy" && exit 1

      - name: Exercise the choreography (auth → production → order → allocation)
        run: |
          set -euo pipefail
          BEER=99999999-9999-9999-9999-999999999999

          token() { # password grant against the imported brewup realm
            curl -sf localhost:8180/realms/brewup/protocol/openid-connect/token \
              -d grant_type=password -d client_id=brewup-api \
              -d "username=$1" -d password=brewup | jq -r .access_token
          }
          OPERATOR=$(token operator); MANAGER=$(token manager); BARFLY=$(token barfly)

          # Authentication and RBAC bite before anything else.
          test "$(curl -s -o /dev/null -w '%{http_code}' localhost:8080/v1/sales)" = "401"
          test "$(curl -s -o /dev/null -w '%{http_code}' localhost:8080/v1/warehouses/availability \
            -H "Authorization: Bearer $BARFLY" -H 'Content-Type: application/json' \
            -d '{"beer_id":"x","beer_name":"y","quantity":{"value":1,"unit_of_measure":"Lt"}}')" = "403"
          echo "auth OK: 401 without token, 403 without the role"

          curl -sf localhost:8080/v1/warehouses/availability \
            -H "Authorization: Bearer $OPERATOR" -H 'Content-Type: application/json' \
            -d "{\"beer_id\":\"$BEER\",\"beer_name\":\"CI Pale Ale\",\"quantity\":{\"value\":100,\"unit_of_measure\":\"Lt\"}}"
          sleep 2
          test "$(curl -sf "localhost:8080/v1/warehouses/availability/$BEER" \
            -H "Authorization: Bearer $BARFLY" | jq -r .quantity.value)" = "100"

          ORDER=$(curl -sf localhost:8080/v1/sales \
            -H "Authorization: Bearer $MANAGER" -H 'Content-Type: application/json' \
            -d "{\"sales_order_number\":\"ci-0001\",\"customer_name\":\"CI Bot\",\"rows\":[{\"beer_id\":\"$BEER\",\"beer_name\":\"CI Pale Ale\",\"quantity\":{\"value\":30,\"unit_of_measure\":\"Lt\"},\"price\":{\"value\":5,\"currency\":\"EUR\"}}]}" \
            | jq -r .id)
          sleep 2

          test "$(curl -sf "localhost:8080/v1/sales/$ORDER" \
            -H "Authorization: Bearer $BARFLY" | jq -r .sales_order_number)" = "ci-0001"
          test "$(curl -sf "localhost:8080/v1/warehouses/availability/$BEER" \
            -H "Authorization: Bearer $BARFLY" | jq -r .quantity.value)" = "70"
          echo "choreography OK: 100 Lt produced, 30 Lt allocated, 70 Lt left"

          # Production readiness: the event store and projections live in
          # Postgres, so a restarted API must still see everything.
          test "$(curl -sf localhost:8080/readyz | jq -r .status)" = "ready"
          docker restart cjbeer-api
          for _ in $(seq 1 30); do
            curl -sf localhost:8080/healthz >/dev/null && break
            sleep 1
          done
          test "$(curl -sf "localhost:8080/v1/warehouses/availability/$BEER" \
            -H "Authorization: Bearer $BARFLY" | jq -r .quantity.value)" = "70"
          test "$(curl -sf "localhost:8080/v1/sales/$ORDER" \
            -H "Authorization: Bearer $BARFLY" | jq -r .sales_order_number)" = "ci-0001"
          echo "durability OK: state survived the API restart"

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v

