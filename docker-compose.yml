# Ordered bring-up: postgres → atlas migrations → seeded, host-reachable API.
#   task docker:up
services:
  postgres:
    image: postgres:16-alpine
    container_name: cjbeer-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-beer}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-beerpassword}
      POSTGRES_DB: ${DB_NAME:-beer}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - ./docker/init:/docker-entrypoint-initdb.d:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-beer} -d ${DB_NAME:-beer}"]
      interval: 2s
      timeout: 3s
      retries: 15

  rabbitmq:
    image: rabbitmq:4-alpine
    container_name: cjbeer-rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 3s
      timeout: 5s
      retries: 15

  keycloak:
    image: quay.io/keycloak/keycloak:26.4
    container_name: cjbeer-keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      # Force the issuer to the host-visible URL so tokens fetched from
      # the host and from inside the network carry the same `iss`.
      KC_HOSTNAME: http://localhost:8180
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8180:8080"
    volumes:
      - ./docker/keycloak:/opt/keycloak/data/import:ro
    healthcheck:
      # The health endpoint lives on the management port (9000); the image
      # has no curl, so poke it over /dev/tcp.
      test:
        - CMD-SHELL
        - "exec 3<>/dev/tcp/127.0.0.1/9000 && printf 'GET /health/ready HTTP/1.0\\r\\n\\r\\n' >&3 && grep -q UP <&3"
      interval: 5s
      timeout: 5s
      retries: 30

  migrate:
    image: arigaio/atlas
    container_name: cjbeer-migrate
    command:
      - migrate
      - apply
      - --dir
      - file:///migrations/versions
      - --url
      - postgres://${DB_USER:-beer}:${DB_PASSWORD:-beerpassword}@postgres:5432/${DB_NAME:-beer}?sslmode=disable
    volumes:
      - ./migrations:/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build: .
    container_name: cjbeer-api
    environment:
      HTTP_ADDR: ":8080"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      GIN_MODE: ${GIN_MODE:-release}
      # Durable mode: event store + read models live in Postgres, so data
      # survives restarts (in-memory mode is for `task run` and tests).
      DB_URL: postgres://${DB_USER:-beer}:${DB_PASSWORD:-beerpassword}@postgres:5432/${DB_NAME:-beer}?sslmode=disable
      # Broker mode: RabbitMQ carries the messages (durable queues), so
      # in-flight work survives restarts too.
      BROKER_URL: amqp://guest:guest@rabbitmq:5672/
      # Auth mode: OIDC bearer tokens + RBAC against Keycloak. The issuer
      # is the host-visible URL (matches the tokens' `iss`); the JWKS keys
      # are fetched over the container network.
      AUTH_ISSUER: http://localhost:8180/realms/brewup
      AUTH_JWKS_URL: http://keycloak:8080/realms/brewup/protocol/openid-connect/certs
      AUTH_CLIENT_ID: brewup-api
    ports:
      - "8080:8080"
    depends_on:
      migrate:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  seed:
    image: alpine/curl
    container_name: cjbeer-seed
    entrypoint: ["/bin/sh", "/seed/seed.sh"]
    environment:
      API_URL: http://api:8080
      KEYCLOAK_URL: http://keycloak:8080
    volumes:
      - ./docker/mock-data:/seed:ro
    depends_on:
      api:
        condition: service_started

volumes:
  pgdata:
